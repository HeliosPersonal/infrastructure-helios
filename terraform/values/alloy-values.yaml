# Grafana Alloy Helm Chart Values
# Managed by Terraform - variables are interpolated at apply time

alloy:
  configMap:
    content: |
      // Prometheus Remote Write to Grafana Cloud
      prometheus.remote_write "grafanacloud" {
        endpoint {
          url = "${prometheus_url}/api/prom/push"
          
          basic_auth {
            username = "${prometheus_user}"
            password = "${grafana_cloud_api_token}"
          }
        }
      }
      
      // OTLP Receiver - For application services
      otelcol.receiver.otlp "otlp_receiver" {
        grpc {
          endpoint = "0.0.0.0:4317"
        }
        
        http {
          endpoint = "0.0.0.0:4318"
        }
        
        output {
          metrics = [otelcol.processor.batch.default.input]
          traces  = [otelcol.processor.batch.default.input]
          logs    = [otelcol.processor.batch.default.input]
        }
      }
      
      // Batch processor for OTLP data
      otelcol.processor.batch "default" {
        output {
          metrics = [otelcol.exporter.prometheus.default.input]
          traces  = [otelcol.exporter.otlp.grafanacloud.input]
          logs    = [otelcol.exporter.loki.grafanacloud.input]
        }
      }
      
      // Convert OTLP metrics to Prometheus format
      otelcol.exporter.prometheus "default" {
        forward_to = [prometheus.relabel.drop_expensive_otlp.receiver]
      }

      // Drop high-cardinality labels from OTLP app metrics
      prometheus.relabel "drop_expensive_otlp" {
        forward_to = [prometheus.remote_write.grafanacloud.receiver]

        // Drop high-cardinality HTTP route/URL labels
        rule {
          action = "labeldrop"
          regex  = "http_route|http_url|http_target|url_path|net_peer_name|net_peer_port|server_address|server_port|peer_service|db_statement|db_operation|exception_type|exception_message|thread_name|code_function|code_filepath"
        }
      }
      
      // Basic auth for Grafana Cloud Tempo
      otelcol.auth.basic "grafanacloud" {
        username = "${tempo_user}"
        password = "${grafana_cloud_api_token}"
      }
      
      // Export traces to Grafana Cloud Tempo via OTLP
      otelcol.exporter.otlp "grafanacloud" {
        client {
          endpoint = "${tempo_url}"
          auth     = otelcol.auth.basic.grafanacloud.handler
        }
      }
      
      // Write logs to Grafana Cloud Loki
      loki.write "grafanacloud" {
        endpoint {
          url = "${loki_url}/loki/api/v1/push"
          
          basic_auth {
            username = "${loki_user}"
            password = "${grafana_cloud_api_token}"
          }
        }
      }
      
      // Export OTLP logs to Loki
      otelcol.exporter.loki "grafanacloud" {
        forward_to = [loki.write.grafanacloud.receiver]
      }
      
      // Self-scrape Alloy's own metrics
      prometheus.exporter.self "alloy" { }
      
      prometheus.scrape "alloy" {
        targets    = prometheus.exporter.self.alloy.targets
        forward_to = [prometheus.remote_write.grafanacloud.receiver]
      }
      
      // Discover Kubernetes services
      discovery.kubernetes "services" {
        role = "service"
      }
      
      // Discover Kubernetes pods
      discovery.kubernetes "pods" {
        role = "pod"
      }
      
      // Discover Kubernetes nodes for cAdvisor
      discovery.kubernetes "nodes" {
        role = "node"
      }
      
      // Keep only essential cAdvisor metrics (drop 80-90% of container metrics)
      prometheus.relabel "drop_expensive_cadvisor" {
        forward_to = [prometheus.remote_write.grafanacloud.receiver]

        // Drop series with no container name (node-level noise)
        rule {
          source_labels = ["container"]
          regex         = "^$"
          action        = "drop"
        }

        // Drop the "pause" / sandbox containers
        rule {
          source_labels = ["container"]
          regex         = "POD"
          action        = "drop"
        }

        // Keep only the most useful container metrics (reduced set)
        rule {
          source_labels = ["__name__"]
          regex         = "container_(cpu_usage_seconds_total|memory_working_set_bytes|oom_events_total)"
          action        = "keep"
        }

        // Drop high-cardinality labels to reduce series count
        rule {
          action = "labeldrop"
          regex  = "id|image|name"
        }
      }

      // Keep only essential node-exporter metrics
      prometheus.relabel "drop_expensive_node" {
        forward_to = [prometheus.remote_write.grafanacloud.receiver]

        rule {
          source_labels = ["__name__"]
          regex         = "node_(cpu_seconds_total|memory_MemAvailable_bytes|memory_MemTotal_bytes|filesystem_avail_bytes|filesystem_size_bytes|load1|load5|load15)"
          action        = "keep"
        }

        // For CPU, only keep the "idle" and "user" modes to cut per-mode cardinality
        rule {
          source_labels = ["__name__", "mode"]
          regex         = "node_cpu_seconds_total;(iowait|softirq|irq|steal|nice)"
          action        = "drop"
        }

        // Only keep the root filesystem (drop tmpfs, overlayfs, etc.)
        rule {
          source_labels = ["__name__", "fstype"]
          regex         = "node_filesystem.*;(tmpfs|overlay|squashfs|devtmpfs)"
          action        = "drop"
        }
      }

      // Keep only essential kube-state-metrics
      prometheus.relabel "drop_expensive_ksm" {
        forward_to = [prometheus.remote_write.grafanacloud.receiver]

        rule {
          source_labels = ["__name__"]
          regex         = "kube_(pod_status_phase|pod_status_ready|pod_container_status_restarts_total|deployment_status_replicas_available|deployment_status_replicas_unavailable|deployment_spec_replicas|node_status_condition)"
          action        = "keep"
        }
      }

      // Scrape cAdvisor for container metrics
      prometheus.scrape "cadvisor" {
        targets = discovery.kubernetes.nodes.targets
        
        job_name        = "cadvisor"
        scheme          = "https"
        metrics_path    = "/metrics/cadvisor"
        scrape_interval = "120s"
        
        bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
        
        tls_config {
          ca_file              = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
          insecure_skip_verify = false
        }
        
        forward_to = [prometheus.relabel.drop_expensive_cadvisor.receiver]
      }
      
      // Scrape kube-state-metrics
      discovery.relabel "kube_state_metrics" {
        targets = discovery.kubernetes.services.targets
        
        rule {
          source_labels = ["__meta_kubernetes_service_name"]
          regex = "kube-state-metrics"
          action = "keep"
        }
      }
      
      prometheus.scrape "kube_state_metrics" {
        targets         = discovery.relabel.kube_state_metrics.output
        job_name        = "kube-state-metrics"
        scrape_interval = "120s"
        forward_to      = [prometheus.relabel.drop_expensive_ksm.receiver]
      }
      
      // Scrape node-exporter
      discovery.relabel "node_exporter" {
        targets = discovery.kubernetes.pods.targets
        
        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
          regex = "prometheus-node-exporter"
          action = "keep"
        }
      }
      
      prometheus.scrape "node_exporter" {
        targets         = discovery.relabel.node_exporter.output
        job_name        = "node-exporter"
        scrape_interval = "120s"
        forward_to      = [prometheus.relabel.drop_expensive_node.receiver]
      }
      
      // Scrape nginx-ingress-controller
      discovery.relabel "nginx_ingress" {
        targets = discovery.kubernetes.pods.targets
        
        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_component"]
          regex = "controller"
          action = "keep"
        }
        
        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
          regex = "ingress-nginx"
          action = "keep"
        }
        
        rule {
          replacement = "$1:10254"
          target_label = "__address__"
          regex = "([^:]+)(?::\\d+)?"
          source_labels = ["__address__"]
        }
      }
      
      // Keep only essential nginx-ingress metrics (drop per-path cardinality)
      prometheus.relabel "drop_expensive_nginx" {
        forward_to = [prometheus.remote_write.grafanacloud.receiver]

        // Keep only request count + latency summary (no buckets) + process basics
        rule {
          source_labels = ["__name__"]
          regex         = "nginx_ingress_controller_(requests|request_duration_seconds_(count|sum)|nginx_process_(cpu_seconds_total|resident_memory_bytes)|config_last_reload_successful)"
          action        = "keep"
        }

        // Drop per-path and per-ingress labels to collapse cardinality
        rule {
          action = "labeldrop"
          regex  = "path|ingress|service"
        }
      }

      prometheus.scrape "nginx_ingress" {
        targets         = discovery.relabel.nginx_ingress.output
        job_name        = "nginx-ingress"
        metrics_path    = "/metrics"
        scrape_interval = "120s"
        forward_to      = [prometheus.relabel.drop_expensive_nginx.receiver]
      }

      // ── Pod log tailing (overflow-webapp only) ──────────────────────────────
      // Only tails overflow-webapp pods. All .NET backend services already ship
      // logs via OTLP → collecting them here too would cause duplicates in Loki
      // and pollute labels (their plain-text "info: ..." format doesn't carry a
      // parseable level field).

      discovery.relabel "pod_logs" {
        targets = discovery.kubernetes.pods.targets

        // Only tail pods in our app namespaces
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          regex         = "apps-staging|apps-production"
          action        = "keep"
        }

        // Only collect overflow-webapp — .NET services ship logs via OTLP already
        rule {
          source_labels = ["__meta_kubernetes_pod_label_app"]
          regex         = "overflow-webapp"
          action        = "keep"
        }

        // Skip pods that are not running
        rule {
          source_labels = ["__meta_kubernetes_pod_phase"]
          regex         = "Pending|Succeeded|Failed|Unknown"
          action        = "drop"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_label_app"]
          target_label  = "app"
        }

        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_node_name"]
          target_label  = "node"
        }
      }

      // loki.source.kubernetes reads via the K8s API (no hostPath mount needed).
      // NOTE: stage.cri {} must NOT be used here — the K8s API already strips the
      // CRI prefix so stage.cri would drop every line.
      loki.source.kubernetes "pod_logs" {
        targets    = discovery.relabel.pod_logs.output
        forward_to = [loki.process.pod_logs.receiver]
      }

      loki.process "pod_logs" {
        // Default every line to level=info.
        // loki.source.kubernetes has no stream label so we cannot derive it from there.
        stage.static_labels {
          values = {
            level = "info",
          }
        }

        // Overwrite to "warn" for lines containing warn keywords.
        // stage.labels only overwrites when the capture is non-empty —
        // non-matching lines keep their current label value.
        stage.regex {
          expression = "(?i)\\b(?P<level>warn)\\b"
        }
        stage.labels {
          values = { level = "" }
        }

        // Overwrite to "error" for lines containing error/failed/exception.
        stage.regex {
          expression = "(?i)\\b(?P<level>error|failed|exception)\\b"
        }
        stage.labels {
          values = { level = "" }
        }

        forward_to = [loki.write.grafanacloud.receiver]
      }
      // ── End pod log tailing ──────────────────────────────────────────────────
  

  extraPorts:
    - name: "otlp-grpc"
      port: 4317
      targetPort: 4317
      protocol: "TCP"
    - name: "otlp-http"
      port: 4318
      targetPort: 4318
      protocol: "TCP"

controller:
  type: "deployment"
  replicas: 1

service:
  type: ClusterIP

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

rbac:
  create: true
  extraClusterRoleRules:
    - apiGroups: [""]
      resources:
        - services
        - endpoints
        - pods
        - pods/log
        - nodes
        - nodes/metrics
        - nodes/stats
      verbs: ["get", "list", "watch"]
    - nonResourceURLs:
        - /metrics
        - /metrics/cadvisor
      verbs: ["get"]

serviceAccount:
  create: true
  name: grafana-alloy

