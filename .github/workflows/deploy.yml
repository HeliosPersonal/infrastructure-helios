name: Deploy Infrastructure

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/**'
      - '.github/workflows/deploy.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'terraform/**'
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action to perform'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy

env:
  TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  TF_VAR_letsencrypt_email: ${{ secrets.LETSENCRYPT_EMAIL }}
  TF_VAR_pg_staging_password: ${{ secrets.PG_STAGING_PASSWORD }}
  TF_VAR_pg_production_password: ${{ secrets.PG_PRODUCTION_PASSWORD }}
  TF_VAR_rabbit_staging_password: ${{ secrets.RABBIT_STAGING_PASSWORD }}
  TF_VAR_rabbit_production_password: ${{ secrets.RABBIT_PRODUCTION_PASSWORD }}
  TF_VAR_typesense_staging_api_key: ${{ secrets.TYPESENSE_STAGING_API_KEY }}
  TF_VAR_typesense_production_api_key: ${{ secrets.TYPESENSE_PRODUCTION_API_KEY }}
  TF_VAR_keycloak_admin_password: ${{ secrets.KEYCLOAK_ADMIN_PASSWORD }}
  TF_VAR_keycloak_postgres_password: ${{ secrets.KEYCLOAK_POSTGRES_PASSWORD }}
  TF_VAR_grafana_cloud_api_token: ${{ secrets.GRAFANA_CLOUD_API_TOKEN }}
  TF_VAR_grafana_cloud_prometheus_url: ${{ secrets.GRAFANA_CLOUD_PROMETHEUS_URL }}
  TF_VAR_grafana_cloud_prometheus_user: ${{ secrets.GRAFANA_CLOUD_PROMETHEUS_USER }}
  TF_VAR_grafana_cloud_loki_url: ${{ secrets.GRAFANA_CLOUD_LOKI_URL }}
  TF_VAR_grafana_cloud_loki_user: ${{ secrets.GRAFANA_CLOUD_LOKI_USER }}
  TF_VAR_grafana_cloud_tempo_url: ${{ secrets.GRAFANA_CLOUD_TEMPO_URL }}
  TF_VAR_grafana_cloud_tempo_user: ${{ secrets.GRAFANA_CLOUD_TEMPO_USER }}
  TF_VAR_base_domain: ${{ vars.BASE_DOMAIN }}
  TF_VAR_internal_domain: ${{ vars.INTERNAL_DOMAIN }}
  TF_VAR_keycloak_subdomain: ${{ vars.KEYCLOAK_SUBDOMAIN }}

jobs:
  terraform:
    name: Terraform
    runs-on: self-hosted
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5"

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var-file="terraform.tfvars" \
            -out=tfplan \
            -no-color
        continue-on-error: true

      - name: Comment PR with Plan
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### Terraform Format 🖌\`${{ steps.fmt.outcome }}\`
            #### Terraform Init ⚙️\`${{ steps.init.outcome }}\`
            #### Terraform Validate 🤖\`${{ steps.validate.outcome }}\`
            #### Terraform Plan 📖\`${{ steps.plan.outcome }}\`

            <details><summary>Show Plan</summary>

            \`\`\`terraform
            ${{ steps.plan.outputs.stdout }}
            \`\`\`

            </details>

            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      - name: Terraform Apply
        if: |
          (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
        run: terraform apply -auto-approve tfplan

      - name: Terraform Destroy
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
        run: |
          terraform destroy \
            -var-file="terraform.tfvars" \
            -auto-approve

      - name: Terraform Output
        if: success() && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
        run: terraform output -json > ../outputs.json

      - name: Upload Outputs
        if: success() && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
        uses: actions/upload-artifact@v4
        with:
          name: terraform-outputs
          path: outputs.json
          retention-days: 30
