name: Deploy Infrastructure

on:
  push:
    branches: [ main ]
    paths:
      - 'terraform/**'
      - '.github/workflows/deploy.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'terraform/**'
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'plan'
        type: choice
        options: [ plan, destroy ]

concurrency:
  group: terraform-infra
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

env:
  # Azure backend auth
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}

  # Terraform variables
  TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  TF_VAR_pg_password: ${{ secrets.PG_PASSWORD }}
  TF_VAR_rabbit_password: ${{ secrets.RABBIT_PASSWORD }}
  TF_VAR_redis_password: ${{ secrets.REDIS_PASSWORD }}
  TF_VAR_typesense_api_key: ${{ secrets.TYPESENSE_API_KEY }}
  TF_VAR_keycloak_admin_password: ${{ secrets.KEYCLOAK_ADMIN_PASSWORD }}
  TF_VAR_keycloak_postgres_password: ${{ secrets.KEYCLOAK_POSTGRES_PASSWORD }}
  TF_VAR_grafana_cloud_api_token: ${{ secrets.GRAFANA_CLOUD_API_TOKEN }}
  TF_VAR_grafana_cloud_prometheus_url: ${{ secrets.GRAFANA_CLOUD_PROMETHEUS_URL }}
  TF_VAR_grafana_cloud_prometheus_user: ${{ secrets.GRAFANA_CLOUD_PROMETHEUS_USER }}
  TF_VAR_grafana_cloud_loki_url: ${{ secrets.GRAFANA_CLOUD_LOKI_URL }}
  TF_VAR_grafana_cloud_loki_user: ${{ secrets.GRAFANA_CLOUD_LOKI_USER }}
  TF_VAR_grafana_cloud_tempo_url: ${{ secrets.GRAFANA_CLOUD_TEMPO_URL }}
  TF_VAR_grafana_cloud_tempo_user: ${{ secrets.GRAFANA_CLOUD_TEMPO_USER }}
  TF_VAR_base_domain: ${{ secrets.BASE_DOMAIN }}
  TF_VAR_internal_domain: ${{ secrets.INTERNAL_DOMAIN }}
  TF_VAR_keycloak_subdomain: ${{ secrets.KEYCLOAK_SUBDOMAIN }}

jobs:
  # ------------------------------------------------------------
  # PLAN — runs on push/pr (and manual plan if needed)
  # ------------------------------------------------------------
  plan:
    name: Terraform Plan
    runs-on: self-hosted
    if: >
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'plan')
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Kubeconfig
        run: |
          set -e
          if [ -z "${{ secrets.KUBECONFIG }}" ]; then
            echo "ERROR: KUBECONFIG secret is not set"
            exit 1
          fi
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          echo "KUBECONFIG=$HOME/.kube/config" >> $GITHUB_ENV
          echo "TF_VAR_kubeconfig_path=$HOME/.kube/config" >> $GITHUB_ENV

      - name: Verify Kubernetes Access
        run: kubectl cluster-info

      - name: Restore Cloudflare Origin Certificates
        run: |
          set -e
          mkdir -p certs
          echo "${{ secrets.CLOUDFLARE_ORIGIN_CRT }}" | base64 -d > certs/origin.crt
          echo "${{ secrets.CLOUDFLARE_ORIGIN_KEY }}" | base64 -d > certs/origin.key
          chmod 600 certs/origin.crt certs/origin.key

      - name: Terraform Init
        run: terraform init

      - name: Import Existing Helm Releases
        run: |
          # Import any Helm releases that exist in the cluster but not in Terraform state.
          # This prevents "cannot re-use a name that is still in use" errors on first-run
          # or after state loss. Failures are silenced: already-managed or missing releases
          # are both safe to ignore.
          terraform import 'helm_release.ollama_production[0]' infra-production/ollama 2>/dev/null || true

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          set -e
          PLAN_OUTPUT=$(terraform plan -out=tfplan -no-color 2>&1) && echo "$PLAN_OUTPUT" | tee plan.txt || {
            LOCK_ID=$(echo "$PLAN_OUTPUT" | grep -o 'ID:.*' | head -1 | awk '{print $2}')
            if [ -n "$LOCK_ID" ]; then
              echo "State is locked (ID: $LOCK_ID) — forcing unlock and retrying..."
              terraform force-unlock -force "$LOCK_ID"
              terraform plan -out=tfplan -no-color | tee plan.txt
            else
              echo "$PLAN_OUTPUT"
              exit 1
            fi
          }

      - name: Upload Plan Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.run_id }}
          path: |
            terraform/tfplan
            terraform/plan.txt
          retention-days: 7

  # ------------------------------------------------------------
  # APPLY — classic flow: after plan, on push to main, wait for approval
  # ------------------------------------------------------------
  apply:
    name: Terraform Apply
    runs-on: self-hosted
    needs: plan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Kubeconfig
        run: |
          set -e
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          echo "KUBECONFIG=$HOME/.kube/config" >> $GITHUB_ENV
          echo "TF_VAR_kubeconfig_path=$HOME/.kube/config" >> $GITHUB_ENV

      - name: Restore Cloudflare Origin Certificates
        run: |
          set -e
          mkdir -p certs
          echo "${{ secrets.CLOUDFLARE_ORIGIN_CRT }}" | base64 -d > certs/origin.crt
          echo "${{ secrets.CLOUDFLARE_ORIGIN_KEY }}" | base64 -d > certs/origin.key
          chmod 600 certs/origin.crt certs/origin.key

      - name: Terraform Init
        run: terraform init

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ github.run_id }}
          path: terraform/

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

  # ------------------------------------------------------------
  # DESTROY — manual only, gated
  # ------------------------------------------------------------
  destroy:
    name: Terraform Destroy
    runs-on: self-hosted
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
    environment:
      name: production
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Kubeconfig
        run: |
          set -e
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          echo "KUBECONFIG=$HOME/.kube/config" >> $GITHUB_ENV
          echo "TF_VAR_kubeconfig_path=$HOME/.kube/config" >> $GITHUB_ENV

      - name: Restore Cloudflare Origin Certificates
        run: |
          set -e
          mkdir -p certs
          echo "${{ secrets.CLOUDFLARE_ORIGIN_CRT }}" | base64 -d > certs/origin.crt
          echo "${{ secrets.CLOUDFLARE_ORIGIN_KEY }}" | base64 -d > certs/origin.key
          chmod 600 certs/origin.crt certs/origin.key

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy
        run: terraform destroy -auto-approve